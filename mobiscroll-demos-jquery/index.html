<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobiscroll jQuery Demos</title>
  </head>
  <body>
    <div class="app-header mbsc-font">
      <div class="app-back" id="app-back">
        <a class="app-link" href="/">
          <span class="mbsc-icon mbsc-font-icon mbsc-icon-ion-ios7-arrow-back"></span>
        </a>
      </div>
      <div class="app-title">
        <h1 id="app-title">Mobiscroll jQuery Demos</h1>
      </div>
    </div>
    <div id="app-wrapper" mbsc-page>
      <div class="app-page" id="app"></div>
    </div>
    <div class="app-footer mbsc-font" style="display: flex; align-items: center; justify-content: center; gap: 24px">
      <div style="display: flex; align-items: center; gap: 16px">
        <div class="app-footer-theme-select">
          <label><input mbsc-segmented name="mobiscroll-theme" value="ios" checked />iOS</label>
          <label><input mbsc-segmented name="mobiscroll-theme" value="material" />Material</label>
          <label><input mbsc-segmented name="mobiscroll-theme" value="windows" />Windows</label>
        </div>
        <div class="app-footer-theme-variant-select">
          <label><input mbsc-segmented name="mobiscroll-theme-variant" value="light" checked />Light</label>
          <label><input mbsc-segmented name="mobiscroll-theme-variant" value="dark" />Dark</label>
        </div>
        <label>
          <input mbsc-input id="mobiscroll-locale" data-dropdown="true" data-input-style="box" class="app-footer-locale-select" />
        </label>
      </div>
      <div class="app-path" id="app-path" style="margin-left: auto"></div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
